<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escena Three.js con HDRI</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute; top: 10px; left: 10px;
      color: #fff; font-family: system-ui, sans-serif; font-size: 13px;
      background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">Click para entrar · WASD moverse · Espacio/C subir/bajar · Shift correr · Rueda zoom · Esc salir</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./main.js"></script>
</body>
</html>
