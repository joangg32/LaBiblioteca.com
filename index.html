<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escena Three.js con HDRI</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: absolute; top: 10px; left: 10px;
      color: #fff; font-family: system-ui, sans-serif; font-size: 13px;
      background: rgba(0,0,0,0.4); padding: 6px 10px; border-radius: 4px;
      pointer-events: none;
    }
    #menu-overlay {
      position: absolute; inset: 0;
      display: none; z-index: 10;
    }
    #menu-overlay.visible { display: block; }
    #menu-close {
      position: absolute; top: 18px; right: 22px;
      width: 40px; height: 40px; border: none; border-radius: 50%;
      background: rgba(255,255,255,0.9); color: #000;
      font-size: 22px; line-height: 40px; cursor: pointer;
    }
    #menu-close:hover { background: #fff; }
    #hotspot-tip {
      position: absolute; left: 0; top: 0;
      transform: translate(14px, -50%);
      color: #fbffbe; font-family: system-ui, sans-serif; font-size: 13px;
      background: rgba(34,82,227,0.92); padding: 5px 10px; border-radius: 4px;
      pointer-events: none; white-space: nowrap; z-index: 15;
      opacity: 0; transition: opacity 0.12s ease;
    }
    #hotspot-tip.visible { opacity: 1; }
    #fade {
      position: absolute; inset: 0; background: #000;
      opacity: 0; pointer-events: none; z-index: 20;
      transition: opacity 0.26s ease;
    }
    #fade.on { opacity: 1; }
  </style>
</head>
<body>
  <div id="info">Arrastrar para mirar · WASD moverse · Espacio/C subir/bajar · Shift correr · Rueda zoom · Clic en los puntos para abrir menús</div>

  <div id="hotspot-tip"></div>

  <div id="menu-overlay">
    <button id="menu-close" aria-label="Cerrar">×</button>
  </div>

  <div id="fade"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./main.js"></script>
</body>
</html>
